name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_PORT: ${{ secrets.VM_PORT || '22' }}
      VM_DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH || format('/home/{0}/dsa-dashboard', secrets.VM_USER) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ env.VM_PORT }}
          envs: VM_DEPLOY_PATH
          script_stop: true
          script: |
            set -e
            echo "VM_DEPLOY_PATH=${VM_DEPLOY_PATH}"
            if [ ! -d "${VM_DEPLOY_PATH}" ]; then
              echo "Deploy path not found: ${VM_DEPLOY_PATH}"
              exit 1
            fi
            if [ ! -f "${VM_DEPLOY_PATH}/scripts/deploy_on_vm.sh" ]; then
              echo "Missing deploy script at: ${VM_DEPLOY_PATH}/scripts/deploy_on_vm.sh"
              exit 1
            fi
            cd "${VM_DEPLOY_PATH}"
            bash "${VM_DEPLOY_PATH}/scripts/deploy_on_vm.sh"
