services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsa-backend
    ports:
      - "3001:3001"
    environment:
      # Utiliser le nom du service PostgreSQL si vous avez un container PostgreSQL
      # Sinon, utiliser host.docker.internal pour accéder à PostgreSQL sur l'hôte
      - DATABASE_URL=postgresql://dsa_admin:Mohamed2025!@host.docker.internal:5432/dsa?connection_limit=20&pool_timeout=20
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost
    networks:
      - dsa-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
        # Bake-time only: un fichier .env à la racine du repo (à côté de ce compose) peut définir VITE_USE_MOCK_DATA.
        # Les frontend/.env ne sont pas utilisés par le build Docker sans les copier dans l'image.
        - VITE_USE_MOCK_DATA=${VITE_USE_MOCK_DATA:-true}
    container_name: dsa-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dsa-network
    restart: unless-stopped

networks:
  dsa-network:
    driver: bridge
